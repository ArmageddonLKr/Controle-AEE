# Deploy para o GitHub Pages via Actions
#
# ATENÇÃO: o gatilho automático por push está DESATIVADO de propósito.
# A conta do GitHub está com pendência de cobrança ("account locked due to a
# billing issue"), o que faz todo job do Actions falhar antes mesmo de iniciar.
# Enquanto isso, o deploy é feito publicando a build na branch `gh-pages`
# (Settings → Pages → Deploy from a branch → gh-pages). Veja o README.
#
# Quando a pendência for resolvida em github.com/settings/billing, basta
# restaurar o gatilho abaixo:
#
#   on:
#     push:
#       branches: [main]
#     workflow_dispatch:
#
# e voltar a configuração do Pages para "GitHub Actions".

name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
